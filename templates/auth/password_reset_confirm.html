<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Código y Nueva Contraseña — ITA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #001f4b 0%, #003B73 40%, #CC0000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrapper { width: 100%; max-width: 440px; padding: 1rem; }
        .login-card {
            background: rgba(255,255,255,.97);
            border-radius: 1.25rem;
            box-shadow: 0 25px 60px rgba(0,0,0,.35);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #003B73 0%, #001f4b 100%);
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            position: relative;
        }
        .login-header::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; right: 0;
            height: 30px;
            background: rgba(255,255,255,.97);
            clip-path: ellipse(55% 100% at 50% 100%);
        }
        .login-header h1 {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 800;
            margin: 0 0 .3rem;
        }
        .login-body { padding: 2rem; }
        .form-label { font-weight: 600; font-size: .85rem; color: #1a1a2e; }
        .form-control {
            border: 1.5px solid #e2e8f0;
            border-radius: .6rem;
            padding: .65rem 1rem;
            font-size: .9rem;
        }
        .form-control:focus {
            border-color: #003B73;
            box-shadow: 0 0 0 3px rgba(0,59,115,.12);
        }
        .btn-ingresar {
            background: linear-gradient(135deg, #003B73 0%, #0057B8 100%);
            border: none;
            border-radius: .6rem;
            padding: .75rem;
            font-weight: 700;
            color: #fff;
            width: 100%;
        }
        .otp-input {
            font-size: 1.5rem !important;
            letter-spacing: 5px;
            text-align: center;
            font-weight: bold;
            color: #003B73;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <h1>Código de Verificación</h1>
        </div>

        <div class="login-body">
            <p class="text-muted small mb-4 text-center">
                Ingresa el código de 6 dígitos que enviamos a tu correo y tu nueva contraseña. <strong>El código expira en 5 minutos.</strong>
            </p>

            <form method="post">
                {% csrf_token %}
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} p-2 small text-center fw-bold">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <div class="mb-4">
                    <label for="otp" class="form-label text-center d-block">
                        <i class="bi bi-shield-lock me-1"></i> Código de 6 dígitos
                    </label>
                    <input type="text" name="otp" id="otp" class="form-control otp-input" 
                           maxlength="6" placeholder="000000" autocomplete="off" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Nueva Contraseña</label>
                    <input type="password" name="password" id="password" class="form-control" 
                           placeholder="Mínimo 8 caracteres" required>
                </div>

                <div class="mb-4">
                    <label for="password_confirm" class="form-label">Confirmar Contraseña</label>
                    <input type="password" name="password_confirm" id="password_confirm" class="form-control" 
                           placeholder="Repite la contraseña" required>
                </div>

                <button type="submit" class="btn-ingresar mt-2">
                    <i class="bi bi-check-lg me-2"></i>Validar y Guardar
                </button>
                
                <div class="text-center mt-3">
                    <a href="{% url 'password_reset' %}" class="text-decoration-none small" style="color: #6c757d;">
                        ¿No recibiste el código? Solicitar otro
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
