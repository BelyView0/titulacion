<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo Enviado — Sistema de Titulación ITA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #001f4b 0%, #003B73 40%, #CC0000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrapper { width: 100%; max-width: 440px; padding: 1rem; }
        .login-card {
            background: rgba(255,255,255,.97);
            border-radius: 1.25rem;
            box-shadow: 0 25px 60px rgba(0,0,0,.35);
            overflow: hidden;
            text-align: center;
            padding: 3rem 2rem;
        }
        .icon-circle {
            width: 80px; height: 80px;
            background: rgba(13,110,253,.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            color: #0d6efd;
            font-size: 2.5rem;
        }
        .btn-ingresar {
            background: linear-gradient(135deg, #003B73 0%, #0057B8 100%);
            border: none;
            border-radius: .6rem;
            padding: .75rem;
            font-weight: 700;
            color: #fff;
            width: 100%;
            display: inline-block;
            text-decoration: none;
            margin-top: 1rem;
        }
        .btn-ingresar:hover { color: #fff; opacity: .9; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="icon-circle">
            <i class="bi bi-envelope-check-fill"></i>
        </div>
        <h2 class="h4 fw-bold mb-3" style="color: #003B73;">Correo Enviado</h2>
        <p class="text-muted small mb-4">
            Si existe una cuenta asociada a ese correo, te hemos enviado un enlace para restablecer tu contraseña. 
            Recuerda que el enlace expirará en 5 minutos. Por favor, revisa también tu carpeta de spam.
        </p>
        <a href="{% url 'login' %}" class="btn-ingresar">Volver al Inicio de Sesión</a>
    </div>
</div>
</body>
</html>
